name: Install Package

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  install:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        r: ['release']

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          rtools-version: '44'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev
        shell: bash

      - name: Install pak (Windows)
        if: runner.os == 'Windows'
        run: |
          install.packages("pak", repos = "https://cran.r-project.org")
        shell: Rscript {0}
 
      - name: Install pak (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          install.packages("pak", repos = "https://r-lib.github.io/p/pak/stable/")
        shell: Rscript {0}

      - name: Install RangeShiftR
        run: |
          pak::pak("RangeShifter/RangeShiftR-pkg/RangeShiftR@${{ github.head_ref || github.ref_name }}")
        shell: Rscript {0}
