name: Install Package
 
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
 
jobs:
  install:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        r: ['release']
 
    steps:
      - uses: actions/checkout@v4
 
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          rtools-version: '44'
 
      - name: Install dependencies
        run: |
          install.packages(c("Rcpp", "devtools", "Rdpack"))
        shell: Rscript {0}
 
      - name: Install RangeShiftR
        run: |
          devtools::install_github("RangeShifter/RangeShiftR-pkg", ref = "${{ github.head_ref || github.ref_name }}", subdir = "RangeShiftR")
        shell: Rscript {0}
