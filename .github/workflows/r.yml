name: Install Package
 
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
 
jobs:
  install:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        r: ['release']
 
    steps:
      - uses: actions/checkout@v4
 
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          rtools-version: '44'
 
      - name: Install pak (Windows/macOS)
        if: runner.os != 'Linux'
        run: |
          install.packages("pak", repos = "https://r-lib.github.io/p/pak/stable/")
        shell: Rscript {0}
 
      - name: Install dependencies
        run: |
          install.packages(c("Rcpp", "Rdpack", "devtools", "remotes"))
        shell: Rscript {0}
 
      - name: Install RangeShiftR (Windows/macOS)
        if: runner.os != 'Linux'
        run: |
          pak::pak("RangeShifter/RangeShiftR-pkg/RangeShiftR@${{ github.head_ref || github.ref_name }}")
        shell: Rscript {0}
 
      - name: Install RangeShiftR (Linux)
        if: runner.os == 'Linux'
        run: |
          devtools::install_github("RangeShifter/RangeShiftR-pkg", ref = "${{ github.head_ref || github.ref_name }}", subdir = "RangeShiftR")
        shell: Rscript {0}
 